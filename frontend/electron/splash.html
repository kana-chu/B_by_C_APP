<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Loading...</title>
<style>
    body {
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #fdfdfd;
        font-family: Meiryo, sans-serif;
        color: #4c6ef5;
        height: 100vh;
        overflow: hidden;
    }

    /* ふわっとフェードイン */
    .fade-in {
        animation: fadeIn 0.8s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    /* かわいい丸型のローディング */
    .loader {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 6px solid #d0e1ff;
        border-top-color: #4c6ef5;
        animation: spin 1s ease infinite;
        margin-bottom: 20px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .title {
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 0.05em;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 12px;
        color: #7b8ec8;
    }

</style>
</head>
<body class="fade-in">

    <div class="loader"></div>

    <div class="title">App for BbyC</div>
    <div class="subtitle">起動中…</div>

</body>
</html>
